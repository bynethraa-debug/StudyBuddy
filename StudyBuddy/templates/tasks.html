<!DOCTYPE html>
<html>
<head>
    <title>My To-Do List</title>

    <style>

    body{
        background:#dfeaf8;
        font-family:Georgia, serif;
        margin:0;
        padding:40px;
    }

    .container{
        max-width:900px;
        margin:auto;
    }

    h1{
        text-align:center;
        color:#102c5f;
        font-size:60px;
    }

    .subtitle{
        text-align:center;
        color:#4d648d;
        font-family:Georgia, serif;
        margin-bottom:35px;
    }

    .back{
        text-decoration:none;
        color:#102c5f;
        font-weight:bold;
        font-size:20px;
    }

    .task-form{
        background:white;
        padding:25px;
        border-radius:20px;
        box-shadow:0 5px 15px rgba(0,0,0,0.08);

        display:grid;
        grid-template-columns:1fr 1fr;
        gap:15px;

        margin-bottom:30px;
    }

    .task-form label{
        font-weight:bold;
        color:#102c5f;
        text-align:left;
    }

    .task-form input,
    .task-form select{
        width:100%;
        padding:12px;
        border-radius:10px;
        border:1px solid #ccc;
        font-size:16px;
        box-sizing:border-box;
    }

    .add-btn{
        grid-column:1 / 3;

        background:#ffb6c1;
        color:white;
        border:none;
        padding:15px;
        border-radius:15px;
        font-size:18px;
        cursor:pointer;
    }

    .add-btn:hover{
        background:#ff9eb0;
    }

    .task-box{
        display:flex;
        justify-content:space-between;
        align-items:center;

        padding:20px;
        margin-top:20px;
        border-radius:20px;

        box-shadow:0 5px 15px rgba(0,0,0,0.08);
    }

    .completed{
        background:#d4edda;
        border-left:8px solid #2e8b57;
    }

    .pending{
        background:#f8d7da;
        border-left:8px solid #c0392b;
    }

    .task-box h3{
        margin:0 0 10px;
        color:#102c5f;
    }

    .task-box p{
        margin:6px 0;
        color:#444;
    }

    .delete-btn{
        background:#ff8c8c;
        color:white;
        border:none;
        padding:10px 18px;
        border-radius:10px;
        cursor:pointer;
    }

    .delete-btn:hover{
        background:#ff6f6f;
    }

    </style>

</head>

<body>

<div class="container">

<a href="/" class="back">⊹ ࣪ ˖ ➤ Back to Dashboard</a>

<h1>🏆 My To-do List 🏆</h1>

<p class="subtitle">
‧₊˚✩ ₊˚📝 Work hard today, so you can be proud tomorrow. ‧₊˚✩ ₊˚📝
</p>

<form action="/add_task" method="POST" class="task-form">

    <label>📝 Task</label>
    <input
        type="text"
        name="task"
        placeholder="Enter your task"
        required
    >

    <label>📚 Subject</label>
    <select name="subject" required>
        <option value="">Select Subject</option>
        <option>Maths</option>
        <option>English</option>
        <option>CS</option>
        <option>Chem</option>
        <option>Phy</option>
    </select>

    <label>📅 Due Date</label>
    <input
        type="date"
        name="due_date"
        required
    >

    <label>✅ Status</label>
    <select name="status" required>
        <option>Pending</option>
        <option>Completed</option>
    </select>

    <button class="add-btn">
        ➕ Add Task
    </button>

</form>

{% for task in tasks %}

<div class="task-box {% if task[4] == 'Completed' %}completed{% else %}pending{% endif %}">

    <div>
        <h3>{{ task[1] }}</h3>

        <p>📚 <b>Subject:</b> {{ task[2] }}</p>

        <p>📅 <b>Due Date:</b> {{ task[3] }}</p>

        <p>✅ <b>Status:</b> {{ task[4] }}</p>
    </div>

    <form action="/delete_task/{{ task[0] }}" method="POST">
        <button class="delete-btn">
            🗑 Delete
        </button>
    </form>

</div>

{% endfor %}

</div>

</body>
</html>
