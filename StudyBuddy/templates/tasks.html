<!DOCTYPE html>
<html>
<head>
<title>My To-Do List</title>

<style>

body{
    background:#dfeaf8;
    font-family:Georgia, serif;
    margin:0;
    padding:40px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    text-align:center;
    color:#102c5f;
    font-size:60px;
}

.subtitle{
    text-align:center;
    color:#4d648d;
    font-style:Georgia, serif
    margin-bottom:40px;
}

.back{
    text-decoration:none;
    color:#102c5f;
    font-weight:bold;
    font-size:20px;
}

form{
    text-align:center;
}

input[type="text"]{
    width:350px;
    padding:15px;
    border:none;
    border-radius:15px;
    font-size:18px;
}

.add-btn{
    background:#ffb6c1;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
    margin-left:10px;
}

.add-btn:hover{
    background:#ff9eb0;
}

.task-box{
    background:white;
    border-radius:20px;
    padding:20px;
    margin-top:20px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.task-name{
    color:#102c5f;
    font-size:24px;
}

.delete-btn{
    background:#ff8c8c;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
}

.delete-btn:hover{
    background:#ff6f6f;
}

</style>

</head>

<body>

<div class="container">

<a href="/" class="back"> ⊹ ࣪ ˖ ➤ Back to Dashboard</a>

<h1> 🏆 My To-do list: 🏆 </h1>

<p class="subtitle">
‧₊˚✩ ₊˚📝  Work hard today, so you can be proud tomorrow. ‧₊˚✩ ₊˚📝
</p>

<form action="/add_task" method="POST">

<input
type="text"
name="task"
placeholder="📝 Enter a task..."
required
>

<button class="add-btn">
➕ Add Task
</button>

</form>

{% for task in tasks %}

<div class="task-box">

<span class="task-name">
📚 {{ task[1] }}
</span>

<form action="/delete_task/{{ task[0] }}" method="POST">

<button class="delete-btn">
🗑 Delete
</button>

</form>

</div>

{% endfor %}

</div>

</body>
</html>
