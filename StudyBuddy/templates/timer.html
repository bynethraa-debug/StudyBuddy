<html>

<style>

body{
    background:#dfeaf7;
    font-family:Georgia, serif;
    text-align:center;
    color:#23395d;
}

.container{
    margin-top:60px;
}

h1{
    font-size:55px;
}

.timer-box{
    background:white;
    width:500px;
    margin:auto;
    padding:40px;
    border-radius:25px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input{
    padding:12px;
    font-size:18px;
    border-radius:10px;
    border:none;
    width:150px;
}

button{
    background:#7aa8ff;
    color:white;
    border:none;
    padding:12px 24px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#5d91f5;
}

#countdown{
    font-size:60px;
    margin-top:30px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>⏰ Study Timer ⏰</h1>

<div class="timer-box">

<h2>Customize Your Session ✨</h2>

<input id="minutes" type="number" placeholder="Minutes">

<button onclick="startTimer()">
🌸 Start Session
</button>
<button onclick="stopTimer()">
⏹ Stop Session
</button>
<button onclick="resetTimer()">
🔄 Reset
</button>
<div id="countdown">
0:00
</div>

</div>

</div>

<script>

let timer;

function startTimer(){

    clearInterval(timer);

    let minutes =
    parseInt(document.getElementById("minutes").value);

    if(!minutes){
        minutes = 25;
    }

    let totalSeconds = minutes * 60;

    timer = setInterval(function(){

        let mins =
        Math.floor(totalSeconds / 60);

        let secs =
        totalSeconds % 60;

        document.getElementById("countdown").innerHTML =
        mins + ":" +
        (secs < 10 ? "0" : "") + secs;

        if(totalSeconds <= 0){

            clearInterval(timer);

            alert("🎉 Study Session Complete!");

        }

        totalSeconds--;

    },1000);

    }
function stopTimer(){

    clearInterval(timer);

    document.getElementById("countdown").innerHTML =
    "Paused ⏸️";

}
function resetTimer(){

    clearInterval(timer);

    document.getElementById("countdown").innerHTML =
    "0:00";

}
