<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>StudyBuddy | Focus Timer</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/timer.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="layout">

    <!-- ================= SIDEBAR ================= -->

    <aside class="sidebar">

        <div class="logo">

            <h1>StudyBuddy<span>✦</span></h1>

        </div>

        <nav>

            <a href="/">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </a>

            <a href="/planner">
                <i class="fa-regular fa-calendar"></i>
                Planner
            </a>

            <a href="/timer" class="active">
                <i class="fa-regular fa-clock"></i>
                Timer
            </a>

            <a href="/progress">
                <i class="fa-solid fa-chart-column"></i>
                Progress
            </a>

            <a href="/notes">
                <i class="fa-regular fa-note-sticky"></i>
                Notes
            </a>

            <a href="/resources">
                <i class="fa-regular fa-folder"></i>
                Resources
            </a>

            <a href="/achievements">
                <i class="fa-solid fa-trophy"></i>
                Achievements
            </a>

            <a href="/settings">
                <i class="fa-solid fa-gear"></i>
                Settings
            </a>

        </nav>

        <div class="sidebar-card">

            <p>

                🌸 Small steps every day
                lead to big results.

            </p>

        </div>

    </aside>

    <!-- ================= MAIN ================= -->

    <main class="main">

        <!-- ================= TOP BAR ================= -->

        <header class="topbar">

            <div class="menu-btn">

                <i class="fa-solid fa-bars"></i>

            </div>

            <div class="top-actions">

                <button>

                    <i class="fa-regular fa-bell"></i>

                </button>

                <button>

                    <i class="fa-regular fa-moon"></i>

                </button>

                <div class="profile">

                    <img src="{{ url_for('static', filename='images/profile.png') }}">

                    <span>Student</span>

                    <i class="fa-solid fa-chevron-down"></i>

                </div>

            </div>

        </header>

        <!-- ================= PAGE HEADER ================= -->

        <section class="page-header">

            <div>

                <h1>

                    Study Timer
                    <span>♡</span>

                </h1>

                <p>

                    Focus today,
                    shine tomorrow ✨

                </p>

            </div>

        </section>

        <!-- ================= MAIN GRID ================= -->

        <section class="timer-grid">

            <!-- ================= LEFT COLUMN ================= -->

            <div class="left-column">

                <!-- Timer Card -->

                <div class="timer-card">

                    <!-- Pomodoro Tabs -->

                    <div class="timer-tabs">

                        <button class="active">

                            Pomodoro

                        </button>

                        <button>

                            Short Break

                        </button>

                        <button>

                            Long Break

                        </button>

                    </div>
